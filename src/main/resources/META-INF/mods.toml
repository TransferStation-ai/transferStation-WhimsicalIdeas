
modLoader = "javafml" #mandatory
loaderVersion = "${loader_version_range}" 
license = "${mod_license}"
[[mods]] #mandatory
modId = "transferstation_whimsicalideas" 
version = "${mod_version}" 
displayName = "${mod_name}" #mandatory
#updateJSONURL="https://change.me.example.invalid/updates.json" #optional
# A URL for the "homepage" for this mod, displayed in the mod UI
#logoFile="transferstation_whimsicalideas.png" #optional
#credits="Thanks for this example mod goes to Java" #optional
authors = "transferstation_whimsicalideas" #optional
# The description text for the mod (multi line!) (#mandatory)
description = '''${mod_description}'''
# A dependency - use the . to indicate dependency for a specific modid. Dependencies are optional.
[[dependencies."transferstation_whimsicalideas"]] #optional
# the modid of the dependency
modId = "forge" #mandatory
# Does this dependency have to exist - if not, ordering below must be specified
mandatory = true #mandatory
# The version range of the dependency
versionRange = "${forge_version_range}" #mandatory
ordering = "NONE"
side = "BOTH"# Here's another dependency
[[dependencies."transferstation_whimsicalideas"]]
modId = "minecraft"
mandatory = true
versionRange = "${minecraft_version_range}"
ordering = "NONE"
side = "BOTH"
